name: smart_pdf_scanner
description: Professional PDF scanner by Rishav Paul

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  image_picker: ^1.1.2
  pdf: ^3.11.1
  printing: ^5.13.4
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  flutter_image_compress: ^2.3.0
  google_mlkit_text_recognition: ^0.15.1
  signature: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
